<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gym Routine Companion</title>
    <style>
:root {
  color-scheme: dark;
  --bg: #080908;
  --bg-2: #101410;
  --panel: rgba(19, 22, 19, 0.92);
  --panel-2: #181d19;
  --ink: #f3f5ef;
  --muted: #9aa49a;
  --line: rgba(255, 255, 255, 0.1);
  --accent: #d8ff3e;
  --accent-2: #35d6ff;
  --accent-3: #ff6b45;
  --warn: #ff654d;
  --shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
  --radius: 8px;
}

body.dark {
  color-scheme: light;
  --bg: #f3f4ef;
  --bg-2: #ffffff;
  --panel: rgba(255, 255, 255, 0.92);
  --panel-2: #e9ece5;
  --ink: #121713;
  --muted: #647064;
  --line: rgba(18, 23, 19, 0.12);
  --accent: #151713;
  --accent-2: #087f9d;
  --accent-3: #d14f30;
  --warn: #b93123;
  --shadow: 0 18px 50px rgba(25, 31, 25, 0.15);
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  min-height: 100vh;
  margin: 0;
  background:
    linear-gradient(120deg, rgba(216, 255, 62, 0.12), transparent 26%),
    linear-gradient(160deg, transparent 52%, rgba(53, 214, 255, 0.08)),
    repeating-linear-gradient(115deg, transparent 0 18px, rgba(255, 255, 255, 0.035) 18px 19px),
    var(--bg);
  color: var(--ink);
  font-family: Inter, Arial, Helvetica, sans-serif;
  letter-spacing: 0;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 50% -20%, rgba(255, 255, 255, 0.13), transparent 38%),
    linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.28) 100%);
  z-index: -1;
}

button,
select,
input,
textarea {
  font: inherit;
}

button,
select {
  min-height: 46px;
}

h1,
h2,
h3,
p {
  margin: 0;
}

h1 {
  font-size: clamp(1.3rem, 3vw, 2rem);
  font-weight: 900;
  line-height: 1;
  text-transform: uppercase;
}

h2 {
  font-size: clamp(1.55rem, 4vw, 2.7rem);
  font-weight: 900;
  line-height: 0.95;
  text-transform: uppercase;
}

h3 {
  font-size: 1.05rem;
  font-weight: 900;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px clamp(16px, 4vw, 34px);
  background: color-mix(in srgb, var(--bg) 82%, transparent);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(18px);
}

.brand-lockup {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}

.brand-mark {
  display: grid;
  flex: 0 0 46px;
  width: 46px;
  height: 46px;
  place-items: center;
  background: var(--accent);
  color: #070807;
  border-radius: 50%;
  font-size: 0.82rem;
  font-weight: 950;
}

.eyebrow,
.progress-label {
  color: var(--muted);
  font-size: 0.72rem;
  font-weight: 900;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.shell {
  width: min(1120px, 100%);
  margin: 0 auto;
  padding: 18px clamp(12px, 3vw, 30px) 44px;
}

.control-band,
.summary,
.timer-panel,
.exercise-card {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel);
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
}

.control-band {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  padding: 12px;
}

label {
  display: grid;
  gap: 6px;
  color: var(--muted);
  font-size: 0.72rem;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

select,
input,
textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: color-mix(in srgb, var(--bg-2) 86%, transparent);
  color: var(--ink);
  outline: none;
  padding: 11px 12px;
}

select:focus,
input:focus,
textarea:focus {
  border-color: color-mix(in srgb, var(--accent) 70%, var(--line));
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
}

button {
  border: 0;
  border-radius: 7px;
  background: var(--accent);
  color: #070807;
  cursor: pointer;
  font-weight: 950;
  padding: 10px 14px;
  text-transform: uppercase;
  transition: transform 0.15s ease, filter 0.15s ease, background 0.15s ease;
}

button:hover {
  filter: brightness(1.07);
  transform: translateY(-1px);
}

button:active {
  transform: translateY(0);
}

.secondary {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--ink);
}

.secondary:hover {
  background: color-mix(in srgb, var(--accent) 14%, transparent);
}

.danger {
  color: var(--warn);
}

.icon-btn {
  width: 54px;
  padding: 0;
  border: 1px solid var(--line);
  background: var(--panel-2);
  color: var(--ink);
  font-size: 0.7rem;
}

.summary {
  position: relative;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 18px;
  min-height: 178px;
  margin-top: 14px;
  overflow: hidden;
  padding: clamp(18px, 4vw, 30px);
}

.summary::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(100deg, transparent 0 52%, color-mix(in srgb, var(--accent) 16%, transparent) 52% 58%, transparent 58%),
    linear-gradient(115deg, transparent 0 72%, color-mix(in srgb, var(--accent-2) 18%, transparent) 72% 76%, transparent 76%);
  pointer-events: none;
}

.summary > * {
  position: relative;
}

#dayMeta {
  max-width: 620px;
  margin-top: 10px;
  color: var(--muted);
  font-weight: 750;
}

.progress-wrap {
  min-width: 190px;
  text-align: right;
}

#progressText {
  display: block;
  margin-top: 4px;
  color: var(--accent);
  font-size: clamp(2.6rem, 6vw, 4.5rem);
  font-weight: 950;
  line-height: 0.9;
}

.progress {
  height: 10px;
  margin-top: 12px;
  overflow: hidden;
  background: color-mix(in srgb, var(--ink) 10%, transparent);
  border-radius: 999px;
}

.progress span {
  display: block;
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  border-radius: inherit;
  transition: width 0.25s ease;
}

.timer-panel {
  display: grid;
  grid-template-columns: minmax(140px, 0.35fr) 1fr;
  align-items: center;
  gap: 14px;
  margin-top: 14px;
  padding: 14px;
}

#timerDisplay {
  display: block;
  min-width: 118px;
  color: var(--accent-2);
  font-size: 2.45rem;
  font-weight: 950;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}

.timer-actions {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 8px;
}

.exercise-list {
  display: grid;
  gap: 14px;
  margin-top: 14px;
}

.exercise-card {
  position: relative;
  overflow: hidden;
}

.exercise-card::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 0;
  width: 4px;
  background: linear-gradient(180deg, var(--accent), var(--accent-2));
}

.exercise-card:has(.done-toggle input:checked) {
  border-color: color-mix(in srgb, var(--accent) 55%, var(--line));
}

.exercise-card:has(.done-toggle input:checked)::before {
  width: 8px;
}

.exercise-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  padding: 18px 18px 14px 22px;
}

.exercise-head h3 {
  margin-top: 5px;
  font-size: clamp(1.1rem, 2.5vw, 1.45rem);
  line-height: 1.05;
  text-transform: uppercase;
}

.done-toggle {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  font-size: 0.78rem;
  text-transform: uppercase;
  white-space: nowrap;
}

.done-toggle input {
  width: 24px;
  height: 24px;
  accent-color: var(--accent);
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  padding: 0 18px 16px 22px;
}

.chip {
  border: 1px solid var(--line);
  border-radius: 999px;
  background: color-mix(in srgb, var(--bg-2) 70%, transparent);
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 900;
  padding: 7px 10px;
}

.chip.strong {
  border-color: color-mix(in srgb, var(--accent) 45%, var(--line));
  color: var(--accent);
}

.card-body {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(320px, 0.85fr);
  gap: 14px;
  padding: 0 18px 18px 22px;
}

.note-box {
  display: grid;
  align-content: start;
  gap: 12px;
  color: var(--muted);
  line-height: 1.5;
}

.note-box button {
  width: fit-content;
}

.subs {
  color: var(--ink);
  font-weight: 850;
}

.set-grid {
  display: grid;
  gap: 8px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: color-mix(in srgb, var(--bg) 38%, transparent);
}

.set-row {
  display: grid;
  grid-template-columns: 58px minmax(0, 1fr) minmax(0, 1fr);
  gap: 8px;
  align-items: center;
}

.set-label {
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 950;
  text-transform: uppercase;
}

textarea {
  min-height: 74px;
  resize: vertical;
}

dialog {
  width: min(780px, calc(100% - 28px));
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel-2);
  color: var(--ink);
  box-shadow: var(--shadow);
}

dialog::backdrop {
  background: rgba(0, 0, 0, 0.62);
}

.dialog-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 18px;
}

.warmup-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

.warmup-grid > div {
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: color-mix(in srgb, var(--bg) 28%, transparent);
}

li {
  margin: 8px 0;
  color: var(--muted);
}

@media (max-width: 760px) {
  .topbar {
    padding-inline: 12px;
  }

  .brand-mark {
    flex-basis: 40px;
    width: 40px;
    height: 40px;
  }

  .control-band,
  .card-body,
  .timer-panel,
  .warmup-grid {
    grid-template-columns: 1fr;
  }

  .summary,
  .exercise-head {
    align-items: stretch;
    flex-direction: column;
  }

  .progress-wrap {
    text-align: left;
  }

  .timer-actions {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .timer-actions button:last-child {
    grid-column: 1 / -1;
  }

  .set-row {
    grid-template-columns: 52px minmax(0, 1fr) minmax(0, 1fr);
  }
}

</style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand-lockup">
        <div class="brand-mark" aria-hidden="true">BT</div>
        <div>
          <p class="eyebrow">Intermediate / Advanced</p>
          <h1>Gym Routine Companion</h1>
        </div>
      </div>
      <button class="icon-btn" id="themeBtn" type="button" aria-label="Toggle theme" title="Toggle theme">MODE</button>
    </header>

    <main class="shell">
      <section class="control-band" aria-label="Workout controls">
        <label>
          <span>Week</span>
          <select id="weekSelect"></select>
        </label>
        <label>
          <span>Day</span>
          <select id="daySelect"></select>
        </label>
        <button id="warmupBtn" class="secondary" type="button">Warm-up</button>
        <button id="resetDayBtn" class="secondary danger" type="button">Clear day</button>
      </section>

      <section class="summary">
        <div>
          <p id="phaseLabel" class="eyebrow"></p>
          <h2 id="dayTitle"></h2>
          <p id="dayMeta"></p>
        </div>
        <div class="progress-wrap" aria-label="Workout progress">
          <span class="progress-label">Complete</span>
          <strong id="progressText">0%</strong>
          <div class="progress"><span id="progressBar"></span></div>
        </div>
      </section>

      <section class="timer-panel" aria-label="Rest timer">
        <div>
          <p class="eyebrow">Rest Timer</p>
          <strong id="timerDisplay">00:00</strong>
        </div>
        <div class="timer-actions">
          <button data-rest="60" type="button">1 min</button>
          <button data-rest="90" type="button">1:30</button>
          <button data-rest="120" type="button">2 min</button>
          <button data-rest="180" type="button">3 min</button>
          <button id="stopTimerBtn" class="secondary" type="button">Stop</button>
        </div>
      </section>

      <section id="exerciseList" class="exercise-list" aria-live="polite"></section>
    </main>

    <dialog id="warmupDialog">
      <form method="dialog">
        <div class="dialog-head">
          <h2>Warm-up Protocol</h2>
          <button class="icon-btn" value="close" aria-label="Close" title="Close">X</button>
        </div>
        <div class="warmup-grid">
          <div>
            <h3>General</h3>
            <ul id="generalWarmup"></ul>
          </div>
          <div>
            <h3>Exercise-specific</h3>
            <ul id="specificWarmup"></ul>
          </div>
        </div>
      </form>
    </dialog>

<script>
const data = window.ROUTINE_DATA;
const storeKey = "gymRoutineCompanion.v1";
const themeKey = "gymRoutineCompanion.theme";

const weekSelect = document.querySelector("#weekSelect");
const daySelect = document.querySelector("#daySelect");
const phaseLabel = document.querySelector("#phaseLabel");
const dayTitle = document.querySelector("#dayTitle");
const dayMeta = document.querySelector("#dayMeta");
const exerciseList = document.querySelector("#exerciseList");
const progressText = document.querySelector("#progressText");
const progressBar = document.querySelector("#progressBar");
const warmupDialog = document.querySelector("#warmupDialog");
const timerDisplay = document.querySelector("#timerDisplay");

let activeWeek = Number(localStorage.getItem("activeWeek") || 1);
let activeDay = Number(localStorage.getItem("activeDay") || 1);
let timerId = null;
let timerRemaining = 0;

function readStore() {
  try {
    return JSON.parse(localStorage.getItem(storeKey)) || {};
  } catch {
    return {};
  }
}

function writeStore(store) {
  localStorage.setItem(storeKey, JSON.stringify(store));
}

function dayKey(week, day) {
  return `w${week}.d${day}`;
}

function exerciseKey(index) {
  return `${dayKey(activeWeek, activeDay)}.e${index}`;
}

function getWeek() {
  return data.weeks.find((week) => week.week === activeWeek) || data.weeks[0];
}

function getDay() {
  return getWeek().days.find((day) => day.day === activeDay) || getWeek().days[0];
}

function parseSetCount(value) {
  const nums = String(value).match(/\d+/g);
  if (!nums) return 1;
  return Math.min(4, Math.max(1, Number(nums[nums.length - 1])));
}

function minutesFromRest(rest) {
  const nums = String(rest).match(/\d+/g);
  if (!nums) return 90;
  return Number(nums[nums.length - 1]) * 60;
}

function formatTime(seconds) {
  const min = Math.floor(seconds / 60).toString().padStart(2, "0");
  const sec = Math.max(0, seconds % 60).toString().padStart(2, "0");
  return `${min}:${sec}`;
}

function startTimer(seconds) {
  clearInterval(timerId);
  timerRemaining = seconds;
  timerDisplay.textContent = formatTime(timerRemaining);
  timerId = setInterval(() => {
    timerRemaining -= 1;
    timerDisplay.textContent = formatTime(timerRemaining);
    if (timerRemaining <= 0) {
      clearInterval(timerId);
      timerId = null;
      timerDisplay.textContent = "Done";
      if ("vibrate" in navigator) navigator.vibrate([180, 90, 180]);
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerId);
  timerId = null;
  timerRemaining = 0;
  timerDisplay.textContent = "00:00";
}

function populateSelectors() {
  weekSelect.innerHTML = data.weeks
    .map((week) => `<option value="${week.week}">Week ${week.week} - ${week.phase}</option>`)
    .join("");
  weekSelect.value = activeWeek;
  renderDayOptions();
}

function renderDayOptions() {
  const week = getWeek();
  daySelect.innerHTML = week.days
    .map((day) => `<option value="${day.day}">Day ${day.day} - ${day.title}</option>`)
    .join("");
  if (!week.days.some((day) => day.day === activeDay)) activeDay = 1;
  daySelect.value = activeDay;
}

function setField(key, value) {
  const store = readStore();
  store[key] = value;
  writeStore(store);
}

function renderProgress() {
  const day = getDay();
  const store = readStore();
  const done = day.exercises.filter((_, index) => store[`${exerciseKey(index)}.done`]).length;
  const pct = day.exercises.length ? Math.round((done / day.exercises.length) * 100) : 0;
  progressText.textContent = `${pct}%`;
  progressBar.style.width = `${pct}%`;
}

function renderWorkout() {
  const week = getWeek();
  const day = getDay();
  const store = readStore();

  phaseLabel.textContent = `Week ${week.week} - ${week.phase}`;
  dayTitle.textContent = `Day ${day.day}: ${day.title}`;
  dayMeta.textContent = `${day.exercises.length} exercises${day.restAfter ? " - Rest day follows" : ""}`;

  exerciseList.innerHTML = day.exercises.map((ex, index) => {
    const sets = parseSetCount(ex.workingSets);
    const key = exerciseKey(index);
    const done = store[`${key}.done`] ? "checked" : "";
    const setRows = Array.from({ length: sets }, (_, setIndex) => {
      const base = `${key}.s${setIndex + 1}`;
      return `
        <div class="set-row">
          <span class="set-label">Set ${setIndex + 1}</span>
          <input inputmode="decimal" aria-label="${ex.exercise} set ${setIndex + 1} load" placeholder="Load" value="${store[`${base}.load`] || ""}" data-save="${base}.load">
          <input inputmode="numeric" aria-label="${ex.exercise} set ${setIndex + 1} reps" placeholder="Reps" value="${store[`${base}.reps`] || ""}" data-save="${base}.reps">
        </div>
      `;
    }).join("");

    return `
      <article class="exercise-card">
        <div class="exercise-head">
          <div>
            <p class="eyebrow">Exercise ${index + 1}</p>
            <h3>${ex.exercise}</h3>
          </div>
          <label class="done-toggle">
            <input type="checkbox" ${done} data-save="${key}.done">
            Done
          </label>
        </div>
        <div class="chips">
          <span class="chip strong">${ex.workingSets} working sets</span>
          <span class="chip">${ex.reps} reps</span>
          <span class="chip">${ex.rest} rest</span>
          <span class="chip">Warm-up ${ex.warmupSets}</span>
          <span class="chip">Early ${ex.earlyRpe}</span>
          <span class="chip">Last ${ex.lastRpe}</span>
          <span class="chip">${ex.intensity}</span>
        </div>
        <div class="card-body">
          <div class="note-box">
            <p>${ex.notes || "No extra notes."}</p>
            <p class="subs">Swap options: ${ex.sub1 || "None listed"} / ${ex.sub2 || "None listed"}</p>
            <button type="button" data-start-rest="${minutesFromRest(ex.rest)}">Start ${ex.rest} timer</button>
          </div>
          <div class="set-grid">
            ${setRows}
            <textarea aria-label="${ex.exercise} notes" placeholder="Form notes, machine setting, pain-free variation..." data-save="${key}.notes">${store[`${key}.notes`] || ""}</textarea>
          </div>
        </div>
      </article>
    `;
  }).join("");

  renderProgress();
}

function renderWarmup() {
  document.querySelector("#generalWarmup").innerHTML = data.warmup.general.map((item) => `<li>${item}</li>`).join("");
  document.querySelector("#specificWarmup").innerHTML = data.warmup.specific.map((item) => `<li>${item}</li>`).join("");
}

document.addEventListener("input", (event) => {
  const target = event.target;
  if (!target.dataset.save) return;
  setField(target.dataset.save, target.type === "checkbox" ? target.checked : target.value);
  renderProgress();
});

document.addEventListener("change", (event) => {
  const target = event.target;
  if (!target.dataset.save) return;
  setField(target.dataset.save, target.type === "checkbox" ? target.checked : target.value);
  renderProgress();
});

document.addEventListener("click", (event) => {
  const rest = event.target.dataset.startRest || event.target.dataset.rest;
  if (rest) startTimer(Number(rest));
});

weekSelect.addEventListener("change", () => {
  activeWeek = Number(weekSelect.value);
  localStorage.setItem("activeWeek", activeWeek);
  renderDayOptions();
  renderWorkout();
});

daySelect.addEventListener("change", () => {
  activeDay = Number(daySelect.value);
  localStorage.setItem("activeDay", activeDay);
  renderWorkout();
});

document.querySelector("#stopTimerBtn").addEventListener("click", stopTimer);

document.querySelector("#warmupBtn").addEventListener("click", () => {
  warmupDialog.showModal();
});

document.querySelector("#resetDayBtn").addEventListener("click", () => {
  if (!confirm("Clear saved logs for this workout day?")) return;
  const store = readStore();
  const prefix = dayKey(activeWeek, activeDay);
  Object.keys(store).forEach((key) => {
    if (key.startsWith(prefix)) delete store[key];
  });
  writeStore(store);
  renderWorkout();
});

document.querySelector("#themeBtn").addEventListener("click", () => {
  document.body.classList.toggle("dark");
  localStorage.setItem(themeKey, document.body.classList.contains("dark") ? "dark" : "light");
});

if (localStorage.getItem(themeKey) === "dark") document.body.classList.add("dark");

populateSelectors();
renderWarmup();
renderWorkout();

</script>
  </body>
</html>
